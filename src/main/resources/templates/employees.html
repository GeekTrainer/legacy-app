<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employees — AssetTrack</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="layout :: navbar('employees')"></div>

<div class="container">
    <ol class="breadcrumb">
        <li><a th:href="@{/}">Home</a></li>
        <li class="active">Employees</li>
    </ol>

    <div class="page-header">
        <h1><span class="glyphicon glyphicon-user"></span> Employees</h1>
    </div>

    <div class="panel panel-default">
        <div class="panel-heading"><span class="glyphicon glyphicon-list"></span> Employee Directory</div>
        <table class="table table-striped table-hover">
            <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Department</th><th>Title</th><th>Status</th></tr></thead>
            <tbody>
                <tr th:each="e : ${employees}">
                    <td th:text="${e.employeeId}"></td>
                    <td><a th:href="@{/employees/detail(id=${e.employeeId})}" th:text="${e.firstName + ' ' + e.lastName}"></a></td>
                    <td th:text="${e.email}"></td>
                    <td th:text="${e.department}"></td>
                    <td th:text="${e.title}"></td>
                    <td>
                        <span th:if="${e.active}" class="label label-success">Active</span>
                        <span th:unless="${e.active}" class="label label-danger">Inactive</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="layout :: footer"></div>
<div th:replace="layout :: scripts"></div>
</body>
</html>
